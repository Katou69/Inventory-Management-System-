<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      tailwind = { config: { corePlugins: { preflight: false } } };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter%3Awght%40100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      *, ::before, ::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div
      data-pencil-name="Test Screen"
      class="box-border w-[1440px] h-[900px] flex flex-col gap-[24px] p-[40px] justify-start items-start overflow-hidden"
    >
      <div
        data-pencil-name="Title"
        class="text-[32px]/[normal] box-border text-[#1A1A1A] font-[Inter,system-ui,sans-serif] font-normal text-left [white-space:nowrap]"
      >
        Hello Pencil
      </div>
    </div>
  </body>
</html>
